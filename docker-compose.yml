version: '3.8'

services:
  # MySQL 8.0 数据库
  mysql:
    image: mysql:8.0
    container_name: chatbi-mysql
    restart: always
    ports:
      - "33060:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: chatbi
      MYSQL_USER: chatbi
      MYSQL_PASSWORD: ChatBI@2026
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./chatbi-server/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=1000
      - --max_allowed_packet=256M
    networks:
      - chatbi-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Stack 7.2（内置 RediSearch + Vector 支持）
  redis:
    image: redis/redis-stack:7.2.0-v9
    container_name: chatbi-redis
    restart: always
    ports:
      - "6380:6379"
    environment:
      - REDIS_ARGS=--appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - chatbi-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # XXL-JOB Admin
  xxl-job-admin:
    image: xuxueli/xxl-job-admin:2.4.0
    container_name: chatbi-xxl-job-admin
    restart: always
    ports:
      - "8080:8080"
    environment:
      PARAMS: "--spring.datasource.url=jdbc:mysql://mysql:3306/xxl_job?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai --spring.datasource.username=root --spring.datasource.password=root123456 --xxl.job.accessToken=default_token"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - chatbi-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/xxl-job-admin"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  chatbi-network:
    driver: bridge
